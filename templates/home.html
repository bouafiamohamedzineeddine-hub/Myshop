<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY SHOP </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>

<body>

    <header>
        <h1>🛍️OUR ECOMERCE- SHOP</h1>
        <nav>
            HOME PAGE</a>
            {% if session.user %}
            <a href="/dashboard">CONTROL PANEL</a>
            <a href="/logout">LOG OUT</a> {% else %}
            <a href="/login">LOG IN</a>
            <a href="/register">REGISTER AN ACOUNT</a> {% endif %}
        </nav>
    </header>

    <!-- admin تحكم بمنتجات من خلال  -->
    <div class="منتجات">
        {% for product in products %}
        <div class="card">
            <img src="{{url_for('static', filename='image/' + product.image)}}">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p>${{ product.price }}</p>
            <button>Buy Now</button>
        </div>
        {% else %}
        <p>لا توجد منتجات</p>
        {% endfor %}
    </div>

</body>

</html>
